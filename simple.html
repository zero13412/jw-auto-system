<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 簡單抓資料 - 杰運汽車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #F3F4F6; }
        [v-cloak] { display: none !important; }
        
        /* 讓表格在手機上可以左右滑動 */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">
    <div id="app" class="flex flex-col h-full" v-cloak>
        
        <header class="bg-emerald-700 text-white p-3 sm:p-4 shadow-md flex justify-between items-center z-10 shrink-0">
            <h1 class="text-base sm:text-xl font-bold">📊 簡單抓資料 (即時看板)</h1>
            <div class="flex gap-3">
                <button @click="fetchData" class="bg-emerald-600 hover:bg-emerald-500 font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded text-sm transition shadow-sm">
                    🔄 重新整理
                </button>
                <a href="/" class="bg-yellow-500 hover:bg-yellow-600 text-emerald-900 font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded text-sm transition shadow-sm">
                    🏠 首頁
                </a>
            </div>
        </header>

        <div class="bg-emerald-800 text-white text-xs py-1 px-4 text-center sm:text-right shrink-0" :class="statusColor">
            {{ statusMessage }}
        </div>

        <main class="flex-1 p-2 sm:p-4 overflow-hidden flex flex-col">
            <div class="bg-white rounded-lg shadow-sm border flex-1 flex flex-col overflow-hidden">
                
                <div v-if="loading" class="flex-1 flex items-center justify-center">
                    <span class="text-xl font-bold text-gray-500 animate-pulse">資料讀取中...</span>
                </div>
                
                <div v-else-if="headers.length === 0" class="flex-1 flex items-center justify-center">
                    <span class="text-lg text-gray-400">目前沒有資料，或 Google Sheet 格式錯誤。</span>
                </div>

                <div v-else class="table-container flex-1 overflow-y-auto">
                    <table class="w-full text-sm text-left whitespace-nowrap">
                        <thead class="bg-gray-100 text-gray-700 sticky top-0 z-10 shadow-sm">
                            <tr>
                                <th v-for="header in headers" :key="header" class="px-4 py-3 font-bold border-b">
                                    {{ header }}
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200">
                            <tr v-for="(row, index) in dataList" :key="index" class="hover:bg-emerald-50 transition">
                                <td v-for="header in headers" :key="header" class="px-4 py-3">
                                    <span v-if="row[header] == '3.1'" class="text-red-600 font-bold bg-red-100 px-2 py-0.5 rounded">{{ row[header] }}</span>
                                    <span v-else-if="row[header] == '2'" class="text-blue-600 font-bold bg-blue-100 px-2 py-0.5 rounded">{{ row[header] }}</span>
                                    <span v-else class="text-gray-800">{{ row[header] }}</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="bg-gray-50 p-2 text-xs text-gray-500 text-center border-t shrink-0">
                    共載入 {{ dataList.length }} 筆資料
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_URL = "/api"; 

        createApp({
            setup() {
                const loading = ref(true);
                const statusMessage = ref("準備就緒");
                const statusColor = ref("text-emerald-200");
                const dataList = ref([]);
                const headers = ref([]);

                const fetchData = async () => {
                    loading.value = true;
                    statusMessage.value = "🔄 正在從 Google Sheet 同步最新資料...";
                    statusColor.value = "text-yellow-300";
                    
                    try {
                        const res = await fetch(`${API_URL}/simple_data`);
                        const result = await res.json();
                        
                        if (result.status === "success") {
                            dataList.value = result.data;
                            if (result.data.length > 0) {
                                headers.value = Object.keys(result.data[0]);
                            }
                            statusMessage.value = `✅ 資料同步完成 (共 ${result.data.length} 筆)`;
                            statusColor.value = "text-emerald-300";
                        } else {
                            throw new Error(result.message);
                        }
                    } catch (e) {
                        console.error(e);
                        statusMessage.value = "❌ 資料讀取失敗";
                        statusColor.value = "text-red-300";
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    fetchData();
                });

                return {
                    loading, statusMessage, statusColor, dataList, headers, fetchData
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
