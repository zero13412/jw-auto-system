<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🤝 恭喜成交系統 - 杰運汽車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #F3F4F6; }
        [v-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="min-h-screen flex flex-col" v-cloak>
        
        <header class="bg-indigo-700 text-white p-3 sm:p-4 shadow-md flex justify-between items-center z-10 relative">
            <h1 class="text-base sm:text-xl font-bold truncate pr-2">🤝 恭喜成交產生器</h1>
            <div class="flex items-center gap-2 sm:gap-4 flex-shrink-0">
                <a href="/" class="bg-yellow-500 hover:bg-yellow-600 text-indigo-900 font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded text-sm transition shadow-sm">
                    🏠 首頁
                </a>
            </div>
        </header>

        <div class="bg-indigo-800 text-white text-xs py-1 px-4 text-center sm:text-right" :class="statusColor">
            {{ statusMessage }}
        </div>

        <div class="flex-1 flex flex-col md:flex-row p-2 sm:p-4 gap-4 overflow-y-auto md:overflow-hidden h-full">
            
            <aside class="w-full md:w-80 lg:w-96 bg-white rounded-lg shadow-sm border p-4 flex-shrink-0 md:overflow-y-auto h-auto md:h-full">
                
                <div class="border-b pb-4 mb-4">
                    <h2 class="font-bold text-gray-700 mb-2">1. 搜尋車輛 (連接資料庫)</h2>
                    <div class="flex gap-2">
                        <input v-model="searchQuery" @keyup.enter="searchCar" type="text" placeholder="輸入車牌" class="flex-1 border border-gray-300 rounded p-2 focus:ring-2 focus:ring-indigo-400 focus:outline-none uppercase text-lg font-bold">
                        <button @click="searchCar" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition font-bold">搜尋</button>
                    </div>
                </div>

                <div class="border-b pb-4 mb-4 space-y-3">
                    <h2 class="font-bold text-gray-700 mb-2">2. 參數設定</h2>
                    
                    <div>
                        <label class="block text-xs font-semibold text-purple-600 mb-1">折扣設定:</label>
                        <div class="flex gap-4 text-sm">
                            <label class="flex items-center gap-1"><input type="radio" v-model="settings.discount" value="折1.1萬"> 折1.1萬</label>
                            <label class="flex items-center gap-1"><input type="radio" v-model="settings.discount" value="不能折"> 不折</label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-orange-500 mb-1">貸款補貼息:</label>
                        <div class="flex gap-4 text-sm">
                            <label class="flex items-center gap-1"><input type="radio" v-model="settings.subsidy" value="折3264"> 折3264</label>
                            <label class="flex items-center gap-1"><input type="radio" v-model="settings.subsidy" value="不折"> 不折</label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-semibold text-teal-700 mb-1">訂金金額 (萬):</label>
                        <input v-model="settings.deposit" type="number" step="0.1" class="w-full border p-2 rounded text-lg font-bold">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-xs font-semibold text-blue-600 mb-1">施工地:</label>
                            <select v-model="settings.site" class="w-full border p-2 rounded text-sm bg-white">
                                <option v-for="s in sites" :key="s.name" :value="s.name">{{ s.label }}</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-green-700 mb-1">過戶點:</label>
                            <select v-model="settings.trans_store" class="w-full border p-2 rounded text-sm bg-white">
                                <option v-for="s in sites" :key="s.name" :value="s.name">{{ s.label }}</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h2 class="font-bold text-gray-700 mb-2">3. 資料確認 (系統自動帶入)</h2>
                    <div class="grid grid-cols-2 gap-2 text-xs sm:text-sm">
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">車牌</label><input v-model="car.plate" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">廠牌</label><input v-model="car.brand" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">車型</label><input v-model="car.model" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">年份</label><input v-model="car.year" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">顏色</label><input v-model="car.color" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">里程</label><input v-model="car.mileage" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        
                        <div class="flex flex-col"><label class="text-red-600 font-bold mb-1">產權公司</label><input v-model="car.company" type="text" class="border p-1.5 rounded bg-yellow-50 text-red-700 font-bold"></div>
                        <div class="flex flex-col"><label class="text-gray-500 mb-1">編號</label><input v-model="car.stock_id" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        
                        <div class="flex flex-col col-span-2"><label class="text-gray-500 mb-1">車身</label><input v-model="car.vin" type="text" class="border p-1.5 rounded bg-gray-50"></div>
                        
                        <div class="flex flex-col">
                            <label class="text-gray-500 mb-1 font-bold text-red-500">網路價(萬)</label>
                            <input v-model="car.list_price" type="number" step="0.1" class="border p-1.5 rounded bg-red-50 border-red-300 text-red-700 font-bold text-base">
                        </div>
                        <div class="flex flex-col">
                            <label class="text-gray-500 mb-1 font-bold text-red-500">合約售價</label>
                            <input v-model="car.deal_price" type="text" class="border p-1.5 rounded bg-red-50 border-red-300 text-red-700 font-bold text-base" readonly>
                        </div>
                    </div>
                </div>

                <button @click="generateText" class="w-full bg-yellow-500 hover:bg-yellow-600 text-slate-900 font-bold py-3 sm:py-4 px-4 rounded mt-6 shadow-md transition text-lg">
                    ⚡ 生成文案 (三區) ⚡
                </button>
            </aside>

            <main class="flex-1 flex flex-col gap-4 md:overflow-y-auto h-auto md:h-full pb-10 md:pb-0">
                
                <div class="flex flex-col bg-white border rounded-lg shadow-sm h-96 md:h-3/5">
                    <div class="bg-gray-100 p-2 sm:p-3 border-b flex justify-between items-center rounded-t-lg">
                        <span class="font-bold text-gray-700 text-sm sm:text-base">1. 成交資料</span>
                        <button @click="copyText('deal')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold px-3 sm:px-4 py-1 rounded text-sm transition">📋 複製</button>
                    </div>
                    <textarea v-model="output.deal" class="flex-1 w-full p-3 sm:p-4 resize-none focus:outline-none text-sm sm:text-base leading-relaxed" readonly></textarea>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 md:h-2/5">
                    <div class="flex-1 flex flex-col bg-white border rounded-lg shadow-sm h-48 sm:h-auto">
                        <div class="bg-gray-100 p-2 sm:p-3 border-b flex justify-between items-center rounded-t-lg">
                            <span class="font-bold text-gray-700 text-sm sm:text-base">2. 給技師</span>
                            <button @click="copyText('tech')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold px-3 py-1 rounded text-sm transition">📋 複製</button>
                        </div>
                        <textarea v-model="output.tech" class="flex-1 w-full p-3 resize-none focus:outline-none text-sm sm:text-base" readonly></textarea>
                    </div>

                    <div class="flex-1 flex flex-col bg-white border rounded-lg shadow-sm h-48 sm:h-auto">
                        <div class="bg-gray-100 p-2 sm:p-3 border-b flex justify-between items-center rounded-t-lg">
                            <span class="font-bold text-gray-700 text-sm sm:text-base">3. 給行政</span>
                            <button @click="copyText('admin')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold px-3 py-1 rounded text-sm transition">📋 複製</button>
                        </div>
                        <textarea v-model="output.admin" class="flex-1 w-full p-3 resize-none focus:outline-none text-sm sm:text-base" readonly></textarea>
                    </div>
                </div>
            </main>
        </div>

        <div v-if="showModal" class="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
            <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full transform transition-all">
                <h3 class="text-xl font-bold mb-3 flex items-center gap-2 text-indigo-700">⚠️ 系統提醒</h3>
                <p class="text-gray-700 whitespace-pre-line text-lg leading-relaxed">{{ modalMessage }}</p>
                <div class="mt-6 flex justify-end">
                    <button @click="showModal = false" class="bg-indigo-600 text-white font-bold px-6 py-2 rounded-lg hover:bg-indigo-700 transition w-full sm:w-auto">好，知道了</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, reactive, watch } = Vue;
        const API_URL = "/api"; 

        createApp({
            setup() {
                const statusMessage = ref("系統準備就緒");
                const statusColor = ref("text-green-300");
                const searchQuery = ref("");
                const showModal = ref(false);
                const modalMessage = ref("");

                const sites = [
                    { name: '北投店', label: '北投' }, { name: '桃園店', label: '桃園' },
                    { name: '新竹店', label: '新竹' }, { name: '台中店', label: '台中' },
                    { name: '高雄店', label: '高雄' }
                ];

                // 移除 company 設定，改由 car.company 全權負責
                const settings = reactive({
                    discount: "折1.1萬", subsidy: "不折",
                    deposit: "2.9", site: "北投店", trans_store: "北投店"
                });

                const car = reactive({
                    plate: '', brand: '', model: '', year: '', 
                    color: '', mileage: '', company: '', stock_id: '', vin: '', 
                    list_price: '0', deal_price: '0'
                });

                const output = reactive({ deal: "", tech: "", admin: "" });

                const updateStatus = (msg, colorClass) => {
                    statusMessage.value = msg;
                    statusColor.value = colorClass;
                };

                const showAlert = (msg) => {
                    modalMessage.value = msg;
                    showModal.value = true;
                };

                const searchCar = async () => {
                    if (!searchQuery.value) return;
                    updateStatus("搜尋中...", "text-yellow-300");
                    
                    try {
                        const res = await fetch(`${API_URL}/search_plate?plate=${encodeURIComponent(searchQuery.value)}`);
                        const result = await res.json();
                        
                        if (result.status === "success") {
                            const d = result.data;
                            car.plate = d['車牌'] || '';
                            car.brand = d['廠牌'] || '';
                            car.model = d['車型'] || '';
                            car.year = d['clean_year'] || '';
                            car.color = d['顏色'] || '';
                            car.mileage = d['里程'] || '';
                            car.stock_id = d['編號'] || ''; // 這裡的編號已經是後端合併過的格式了！
                            car.vin = d['車身'] || '';
                            car.list_price = String(d['顯示價格'] || '0');
                            
                            // 自動抓取產權公司 (優先抓「產權」，沒有就抓「公司」)
                            car.company = (d['產權'] && d['產權'] !== 'nan') ? d['產權'] : 
                                          ((d['公司'] && d['公司'] !== 'nan') ? d['公司'] : '');
                            
                            updateStatus(`✅ 找到車輛：${car.model} (產權：${car.company || '無'})`, "text-green-300");
                            calcPrice();
                        } else {
                            updateStatus("❌ 查無此車牌", "text-red-300");
                            showAlert("資料庫中找不到這個車牌\n請確認 Google Sheet 資料是否已更新。");
                        }
                    } catch (e) {
                        updateStatus("❌ 網路連線錯誤", "text-red-300");
                    }
                };

                const calcPrice = () => {
                    let list_price_wan = parseFloat(car.list_price) || 0;
                    let current_price_yuan = list_price_wan * 10000;

                    if (settings.discount === "折1.1萬") current_price_yuan -= 11000;
                    if (settings.subsidy === "折3264") current_price_yuan -= 3264;

                    if (settings.subsidy === "折3264") {
                        car.deal_price = Math.round(current_price_yuan).toString();
                    } else {
                        car.deal_price = (current_price_yuan / 10000).toFixed(2).replace(/\.00$/, '');
                    }
                };

                watch([() => car.list_price, () => settings.discount, () => settings.subsidy], calcPrice);

                const generateText = () => {
                    calcPrice(); 
                    
                    let deposit_wan = parseFloat(settings.deposit) || 0;
                    let deposit_yuan = deposit_wan * 10000;
                    let list_price_wan = parseFloat(car.list_price) || 0;
                    let list_price_yuan = list_price_wan * 10000;

                    let price_after_11k = list_price_yuan;
                    if (settings.discount === "折1.1萬") price_after_11k -= 11000;

                    let has_subsidy = (settings.subsidy === "折3264");
                    let price_after_subsidy = price_after_11k;
                    if (has_subsidy) price_after_subsidy -= 3264;

                    let final_balance = price_after_subsidy - deposit_yuan;

                    // 智慧判斷產權與匯款帳號
                    let company_str = car.company || "";
                    let source_header = "";
                    let bank_name = "玉山銀行 石牌分行";
                    let account_name = "杰運汽車股份有限公司";
                    let account_number = "0864940036786";

                    if (company_str.includes("展帆")) {
                        source_header = "展帆車源";
                        bank_name = "中國信託 萬華分行";
                        account_name = "展帆汽車有限公司";
                        account_number = "668545685788";
                    } else if (company_str.includes("禾迪")) {
                        source_header = "禾迪車源";
                        bank_name = "中國信託 板和分行";
                        account_name = "禾迪汽車有限公司";
                        account_number = "186540179959";
                    } else if (company_str.includes("杰租")) {
                        source_header = "租車車源";
                        // 杰租使用預設的杰運銀行帳戶
                    }

                    let dealLines = [
                        source_header,
                        "先生小姐",
                        "銷售業務:",
                        "合約編號：",
                        `車號: ${car.plate}`,
                        `車身碼: ${car.vin}`,
                        `廠牌：${car.brand}`,
                        `年分: ${car.year}`,
                        `車型: ${car.model}`,
                        `顏色: ${car.color}色`,
                        `里程: ${car.mileage}萬`,
                        `售價：${car.list_price}萬`,
                        (settings.discount === "折1.1萬" ? "線上折1.1萬" : ""),
                        (has_subsidy ? "貸款補貼息3264元" : ""),
                        "合約車主:",
                        `合約售價：${car.deal_price}${has_subsidy ? '元' : '萬'}`,
                        "付款方式:匯款/貸款",
                        "匯款人：",
                        "金額： 萬",
                        "匯款帳號末五碼:",
                        `匯款帳號:${bank_name} `,
                        `戶名:${account_name} `,
                        `帳號:${account_number}`,
                        "未匯款金額: 萬",
                        "———————————",
                        "",
                        "———————————",
                        (has_subsidy ? "贈交美、好禮二選一補貼息3264元" : "贈交美、好禮二選一")
                    ].filter(line => line !== "").join("\n");

                    let calcStr = `\n\n\n\n【金額試算明細】
1. 售價 (網路)： ${list_price_wan} 萬
2. 折1.1萬後 ： ${settings.discount === "折1.1萬" ? (price_after_11k/10000) + '萬' : '未選擇'}
3. 貸款補貼息： ${has_subsidy ? '有 (折3264)' : '無'}
4. 合約總價  ： ${has_subsidy ? Math.round(price_after_subsidy) + '元' : (price_after_subsidy/10000) + '萬'}
5. 訂金 (${deposit_wan}萬) 後尾款： ${Math.round(final_balance)} 元`;

                    output.deal = dealLines + calcStr;

                    output.tech = `${car.year} ${car.brand} ${car.model}
車號：${car.plate}
施工地：${settings.site}
車主資料已建立`;

                    let trans_note = settings.trans_store === "北投店" ? "" : `(${settings.trans_store.replace('店','')}過戶)`;
                    output.admin = `${car.year} ${car.brand} ${car.model}
編號：${car.stock_id}
車號：${car.plate}

${trans_note}`;
                    
                    if (window.innerWidth < 768) {
                        setTimeout(() => { window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' }); }, 100);
                    }
                    
                    let display_company = car.company || "杰運預設";
                    updateStatus(`⚡ 文案已生成 (系統判斷產權: ${display_company})！`, "text-blue-300");
                };

                const copyText = (type) => {
                    let textToCopy = output[type];
                    if (!textToCopy) return;

                    navigator.clipboard.writeText(textToCopy).then(() => {
                        updateStatus(`✅ 已複製`, "text-green-300");
                        if (type === 'deal') showAlert("記得輸入合約編號喔！📝");
                        if (type === 'admin') showAlert("記得填寫取證表唷！📝");
                    });
                };

                document.querySelector('[v-show="showModal"]')?.removeAttribute('style');

                return {
                    statusMessage, statusColor, searchQuery, showModal, modalMessage,
                    sites, settings, car, output,
                    searchCar, generateText, copyText
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
