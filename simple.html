<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 簡單抓資料 - 杰運汽車</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #F3F4F6; }
        [v-cloak] { display: none !important; }
        
        .table-container {
            width: 100%;
            height: calc(100vh - 120px);
            overflow: auto; 
            -webkit-overflow-scrolling: touch; 
        }

        th {
            position: sticky;
            top: 0;
            background-color: #f3f4f6; 
            z-index: 10;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen overflow-hidden">
    <div id="app" class="flex flex-col h-full" v-cloak>
        
        <header class="bg-emerald-700 text-white p-3 sm:p-4 shadow-md flex justify-between items-center z-20 shrink-0">
            <h1 class="text-base sm:text-xl font-bold">📊 簡單抓資料 (即時看板)</h1>
            <div class="flex gap-2 sm:gap-3">
                <button @click="fetchData" class="bg-emerald-600 hover:bg-emerald-500 font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded text-sm transition shadow-sm">
                    🔄 重新整理
                </button>
                <a href="/" class="bg-yellow-500 hover:bg-yellow-600 text-emerald-900 font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded text-sm transition shadow-sm">
                    🏠 首頁
                </a>
            </div>
        </header>

        <div class="bg-emerald-800 text-white text-xs py-1 px-4 text-center sm:text-right shrink-0 shadow-inner" :class="statusColor">
            {{ statusMessage }}
        </div>

        <main class="flex-1 p-2 sm:p-4 bg-gray-100">
            <div class="bg-white rounded-lg shadow-md border border-gray-200 h-full flex flex-col">
                
                <div v-if="loading" class="flex-1 flex flex-col items-center justify-center">
                    <div class="text-4xl mb-4 animate-spin">⏳</div>
                    <span class="text-lg font-bold text-gray-500 animate-pulse">資料讀取中...</span>
                </div>
                
                <div v-else-if="headers.length === 0" class="flex-1 flex flex-col items-center justify-center text-center p-6">
                    <div class="text-5xl mb-4">📭</div>
                    <span class="text-xl text-gray-500 font-bold mb-2">目前沒有資料</span>
                    <span class="text-sm text-gray-400">請確認 Google Sheet 的「簡單抓資料」分頁是否有內容，<br>且標題列設定在第 4 列。</span>
                </div>

                <div v-else class="table-container">
                    <table class="w-full text-sm text-left whitespace-nowrap table-auto border-collapse">
                        <thead>
                            <tr>
                                <th v-for="header in headers" :key="header" class="px-4 py-3 font-bold border border-gray-300 text-gray-700">
                                    {{ header.includes('__未命名_') ? '代碼' : header }}
                                </th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 bg-white">
                            <tr v-for="(row, index) in dataList" :key="index" class="hover:bg-emerald-50 transition duration-150">
                                <td v-for="header in headers" :key="header" class="px-4 py-2 border border-gray-200 text-center sm:text-left">
                                    <span v-if="String(row[header]).trim() === '3.1'" class="text-red-600 font-bold bg-red-100 px-3 py-1 rounded shadow-sm text-base">3.1</span>
                                    <span v-else-if="String(row[header]).trim() === '2'" class="text-blue-600 font-bold bg-blue-100 px-3 py-1 rounded shadow-sm text-base">2</span>
                                    <span v-else class="text-gray-800">{{ row[header] }}</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div v-if="!loading && headers.length > 0" class="bg-gray-50 p-2 text-xs font-bold text-gray-500 text-center border-t border-gray-200 shrink-0">
                    共載入 {{ dataList.length }} 筆資料
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_URL = "/api"; 

        createApp({
            setup() {
                const loading = ref(true);
                const statusMessage = ref("準備就緒");
                const statusColor = ref("text-emerald-200");
                const dataList = ref([]);
                const headers = ref([]);

                const processHeaders = (data) => {
                    if (!data || data.length === 0) return [];
                    let cols = Object.keys(data[0]);
                    
                    // 1. 隱藏包含「起算」的欄位
                    cols = cols.filter(c => !String(c).includes('起算'));
                    
                    // 2. 尋找三大關鍵欄位 (支援更多關鍵字包容)
                    let itemCol = cols.find(c => String(c).includes('項') || String(c).includes('序') || String(c).includes('編號'));
                    let priceCol = cols.find(c => String(c).includes('網') || String(c).includes('售') || String(c).includes('價'));
                    let codeCol = cols.find(c => {
                        let colName = String(c);
                        if (colName.includes('__未命名_') || colName.includes('代碼')) return true;
                        // 抽樣檢查內容是否包含 3.1 或 2
                        return data.slice(0, 10).some(r => String(r[c]).trim() === '3.1' || String(r[c]).trim() === '2');
                    });

                    let finalCols = [];

                    // [步驟A] 強制把「項次」排在第一格
                    if (itemCol) finalCols.push(itemCol);

                    // [步驟B] 依序塞入其他欄位
                    for (let c of cols) {
                        if (c !== itemCol && c !== codeCol) {
                            finalCols.push(c);
                        }
                    }

                    // [步驟C] 強制把「代碼」安插在「價格」的後面一格
                    if (codeCol) {
                        if (priceCol) {
                            let insertIdx = finalCols.indexOf(priceCol) + 1;
                            finalCols.splice(insertIdx, 0, codeCol);
                        } else {
                            finalCols.push(codeCol);
                        }
                    }
                    
                    return finalCols;
                };

                const fetchData = async () => {
                    loading.value = true;
                    statusMessage.value = "🔄 正在從 Google Sheet 同步最新資料...";
                    statusColor.value = "text-yellow-300";
                    
                    try {
                        const res = await fetch(`${API_URL}/simple_data`);
                        const result = await res.json();
                        
                        if (result.status === "success") {
                            dataList.value = result.data;
                            headers.value = processHeaders(result.data);
                            
                            statusMessage.value = `✅ 資料同步完成 (共 ${result.data.length} 筆)`;
                            statusColor.value = "text-emerald-300";
                        } else {
                            throw new Error(result.message);
                        }
                    } catch (e) {
                        console.error(e);
                        statusMessage.value = "❌ 資料讀取失敗";
                        statusColor.value = "text-red-300";
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(() => {
                    fetchData();
                });

                return {
                    loading, statusMessage, statusColor, dataList, headers, fetchData
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
